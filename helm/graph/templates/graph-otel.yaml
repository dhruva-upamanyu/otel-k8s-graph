{{- if .Values.graphOtel.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: graph-otel
  namespace: {{ .Release.Namespace }}
  labels:
    app: graph-otel
spec:
  replicas: 1 # single relationship writer; delta/expiry is unsafe across replicas
  strategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app: graph-otel
  template:
    metadata:
      labels:
        app: graph-otel
    spec:
      containers:
        - name: graph-otel
          image: {{ include "graph.image" (dict "root" $ "name" .Values.graphOtel.imageName) | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http # /healthz probes only
              containerPort: 8080
            - name: otlp-grpc
              containerPort: 4317
          env:
            {{- include "graph.redisEnv" . | nindent 12 }}
            - name: LISTEN_ADDR
              value: {{ .Values.graphOtel.config.listenAddr | quote }}
            - name: GRPC_LISTEN_ADDR
              value: {{ .Values.graphOtel.config.grpcListenAddr | quote }}
            - name: GRPC_MAX_RECV_MSG_MIB
              value: {{ .Values.graphOtel.config.grpcMaxRecvMsgMib | quote }}
            - name: GRAPH_FLUSH_DELAY
              value: {{ .Values.graphOtel.config.flushDelay | quote }}
            - name: GRAPH_FLUSH_INTERVAL
              value: {{ .Values.graphOtel.config.flushInterval | quote }}
            - name: GRAPH_EXPIRY_TTL
              value: {{ .Values.graphOtel.config.expiryTtl | quote }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.graphOtel.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: graph-otel-otlp
  namespace: {{ .Release.Namespace }}
  labels:
    app: graph-otel
spec:
  # OTLP ingest endpoint: point the collector's traces exporter here
  # (graph-otel-otlp:{{ .Values.graphOtel.service.otlpPort }}).
  type: {{ .Values.graphOtel.service.type }}
  selector:
    app: graph-otel
  ports:
    - name: otlp-grpc
      port: {{ .Values.graphOtel.service.otlpPort }}
      targetPort: otlp-grpc
{{- end }}
