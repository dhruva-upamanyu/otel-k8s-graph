{{- if .Values.graphRead.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: graph-read
  namespace: {{ .Release.Namespace }}
  labels:
    app: graph-read
spec:
  replicas: {{ .Values.graphRead.replicas }}
  strategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app: graph-read
  template:
    metadata:
      labels:
        app: graph-read
    spec:
      containers:
        - name: graph-read
          image: {{ include "graph.image" (dict "root" $ "name" .Values.graphRead.imageName) | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          # Default entrypoint = HTTP query API. The `mcp` stdio mode is run
          # locally by an MCP client, not in-cluster.
          ports:
            - name: http
              containerPort: 8080
          env:
            {{- include "graph.redisEnv" . | nindent 12 }}
            - name: LISTEN_ADDR
              value: {{ .Values.graphRead.config.listenAddr | quote }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          resources:
            {{- toYaml .Values.graphRead.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: graph-read
  namespace: {{ .Release.Namespace }}
  labels:
    app: graph-read
spec:
  type: {{ .Values.graphRead.service.type }}
  selector:
    app: graph-read
  ports:
    - name: http
      port: {{ .Values.graphRead.service.port }}
      targetPort: http
{{- end }}
