{{- if .Values.redis.internal.enabled }}
{{- $name := printf "%s-redis" .Release.Name }}
apiVersion: v1
kind: Service
metadata:
  name: {{ $name }}
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ $name }}
spec:
  type: ClusterIP
  selector:
    app: {{ $name }}
  ports:
    - name: redis
      port: 6379
      targetPort: redis
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ $name }}
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ $name }}
spec:
  serviceName: {{ $name }}
  replicas: 1 # single instance; use an external Redis for HA
  selector:
    matchLabels:
      app: {{ $name }}
  template:
    metadata:
      labels:
        app: {{ $name }}
    spec:
      containers:
        - name: redis
          image: {{ .Values.redis.internal.image | quote }}
          imagePullPolicy: IfNotPresent # pinned tag; not tied to image.pullPolicy (Always)
          ports:
            - name: redis
              containerPort: 6379
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 2
            periodSeconds: 5
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            {{- toYaml .Values.redis.internal.resources | nindent 12 }}
  {{- if .Values.redis.internal.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- with .Values.redis.internal.persistence.storageClassName }}
        storageClassName: {{ . | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.redis.internal.persistence.size }}
  {{- else }}
      volumes: # spec.template.spec.volumes (pod-level, unlike volumeClaimTemplates above)
        - name: data
          emptyDir: {}
  {{- end }}
{{- end }}
